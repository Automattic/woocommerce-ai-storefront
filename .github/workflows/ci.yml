name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  php-tests:
    name: PHP Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPUnit
        run: vendor/bin/phpunit

  js-tests:
    name: JS Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Jest
        run: npm run test:js -- --no-coverage

  js-lint:
    name: JS Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint JS
        run: npm run lint:js

  phpcs:
    name: PHPCS (WordPress coding standards)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2, cs2pr
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      # `-q` suppresses phpcs's progress dots and timing footer (both
      # emitted on stdout by default), so cs2pr gets pure XML and
      # doesn't choke on "Start tag expected, '<' not found" when the
      # report is otherwise clean.
      - name: Run PHPCS
        run: vendor/bin/phpcs -q --report=checkstyle | cs2pr

  phpstan:
    name: PHPStan (static analysis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=1G --error-format=github

  i18n-check:
    # Regenerates the .pot translation template and fails the build if
    # the checked-in version is stale — i.e. someone added or changed
    # a translatable string but didn't regenerate
    # `languages/woocommerce-ai-storefront.pot` to match.
    #
    # Why fail instead of auto-commit: matches Gutenberg's approach.
    # Auto-commits create PR-review churn (the regen lands as a
    # separate commit that reviewers have to mentally skip over), and
    # they confuse the mental model of "what did this PR change?" An
    # explicit fail forces the author to run the regen locally and
    # include it in their own commit history, keeping the PR's
    # translation surface visible during review.
    name: i18n (.pot freshness)
    runs-on: ubuntu-latest
    # WP-CLI is pinned to a specific release for two reasons:
    # (1) supply-chain hygiene — we fetch a versioned asset with a
    # published sha512 and verify it before executing, instead of
    # pulling "whatever is latest" from the build branch of
    # wp-cli/builds. (2) reproducibility — `wp i18n make-pot` writes
    # an `X-Generator: WP-CLI <version>` header into the .pot, which
    # changes whenever wp-cli bumps. Pinning means an intentional
    # wp-cli upgrade is a one-line bump here plus a committed .pot
    # regeneration; an accidental drift on the builds branch can't
    # turn every open PR red without warning.
    env:
      WP_CLI_VERSION: '2.12.0'
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install WP-CLI (pinned + verified)
        shell: bash
        # `curl -fsSL`:
        #   -f   fail with nonzero exit on HTTP 4xx/5xx (plain -sL
        #        would happily write a GitHub 404 HTML page to
        #        wp-cli.phar and defer the failure to an opaque
        #        "PHP parse error" during make-pot).
        #   -s   silent mode (suppress progress bar).
        #   -S   show errors if -s is active.
        #   -L   follow GitHub's release redirect to the asset host.
        #
        # The sha512 file from wp-cli releases contains the hash
        # only (no filename), so we construct the canonical
        # "<hash>  <file>" format sha512sum expects and pipe it to
        # `sha512sum -c`. Any tampering or network corruption flips
        # the check non-zero and the job fails before wp-cli runs.
        #
        # `wp --info` is a sanity check: if the phar somehow got
        # past the checksum but isn't actually runnable, --info
        # surfaces the problem with a clean error rather than having
        # make-pot error ambiguously downstream.
        run: |
          curl -fsSL -o wp-cli.phar \
            "https://github.com/wp-cli/wp-cli/releases/download/v${WP_CLI_VERSION}/wp-cli-${WP_CLI_VERSION}.phar"
          curl -fsSL -o wp-cli.phar.sha512 \
            "https://github.com/wp-cli/wp-cli/releases/download/v${WP_CLI_VERSION}/wp-cli-${WP_CLI_VERSION}.phar.sha512"
          echo "$(cat wp-cli.phar.sha512)  wp-cli.phar" | sha512sum -c -
          chmod +x wp-cli.phar
          sudo mv wp-cli.phar /usr/local/bin/wp
          wp --info

      - name: Regenerate .pot in place and compare
        shell: bash
        # Two volatile headers are stripped from both sides of the
        # diff before comparison:
        #
        #   POT-Creation-Date — changes on every run (the current
        #     timestamp). Without stripping, every job would fail.
        #
        #   X-Generator — encodes the wp-cli version that produced
        #     the file. We also pin WP_CLI_VERSION above so this
        #     header is stable in practice, but stripping it is
        #     belt-and-suspenders: if someone bumps the wp-cli pin
        #     without regenerating the .pot locally first, we'd
        #     rather flag the real issue (changed strings or
        #     conscious version bump) than the generator line.
        #
        # Any remaining difference after stripping means a real
        # string was added, removed, or reworded since the last
        # regeneration — exactly what we want to catch.
        #
        # `--headers` overrides the `Report-Msgid-Bugs-To` URL that
        # wp-cli derives from the on-disk directory name. This repo
        # is distributed as `woocommerce-ai-storefront` on
        # wordpress.org but lives in different directory names on
        # contributors' machines; hard-coding the distribution slug
        # keeps the regenerated file byte-identical regardless of
        # local checkout path.
        run: |
          cp languages/woocommerce-ai-storefront.pot /tmp/pot-before.pot

          wp i18n make-pot . languages/woocommerce-ai-storefront.pot \
            --domain=woocommerce-ai-storefront \
            --exclude=build,node_modules,vendor,tests \
            --headers='{"Report-Msgid-Bugs-To":"https://wordpress.org/support/plugin/woocommerce-ai-storefront"}' \
            --skip-plugins --skip-themes

          if ! diff -u \
              <(grep -v -e '^"POT-Creation-Date:' -e '^"X-Generator:' /tmp/pot-before.pot) \
              <(grep -v -e '^"POT-Creation-Date:' -e '^"X-Generator:' languages/woocommerce-ai-storefront.pot); then
            echo ""
            echo "::error::The .pot translation template is out of date."
            echo ""
            echo "Translatable strings were added, removed, or reworded since"
            echo "the last regeneration, but languages/woocommerce-ai-storefront.pot"
            echo "wasn't updated to match."
            echo ""
            echo "To fix, regenerate locally:"
            echo ""
            echo "  wp i18n make-pot . languages/woocommerce-ai-storefront.pot \\"
            echo "    --domain=woocommerce-ai-storefront \\"
            echo "    --exclude=build,node_modules,vendor,tests \\"
            echo "    --headers='{\"Report-Msgid-Bugs-To\":\"https://wordpress.org/support/plugin/woocommerce-ai-storefront\"}'"
            echo ""
            echo "Then commit the updated .pot file alongside your other changes"
            echo "and push again."
            echo ""
            echo "Install wp-cli: https://wp-cli.org/#installing"
            exit 1
          fi
